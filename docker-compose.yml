version: '3.8'

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/airflow.Dockerfile
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: ${AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION}
    AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES}
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY:-weather-etl-secret-key-change-in-prod}
    AIRFLOW__WEBSERVER__WEB_SERVER_MASTER_TIMEOUT: "300"
    AIRFLOW__WEBSERVER__WORKER_REFRESH_BATCH_SIZE: "1"
    POSTGRES_USER: ${POSTGRES_USER}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    POSTGRES_DB: ${POSTGRES_DB}
    POSTGRES_HOST: ${POSTGRES_HOST}
    POSTGRES_PORT: ${POSTGRES_PORT}
    DEFAULT_CITY: ${DEFAULT_CITY}
    DEFAULT_LATITUDE: ${DEFAULT_LATITUDE}
    DEFAULT_LONGITUDE: ${DEFAULT_LONGITUDE}
    SMTP_HOST: ${SMTP_HOST:-mailhog}
    SMTP_PORT: ${SMTP_PORT:-1025}
    SMTP_USER: ${SMTP_USER:-}
    SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    SMTP_FROM: ${SMTP_FROM:-weather-etl@local.dev}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/tasks:/opt/airflow/tasks
    - ./airflow/plugins:/opt/airflow/plugins
    - ./config:/opt/airflow/config
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:

  # ─────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: weather_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────────
  # Airflow Init
  # ─────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: weather_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate

        # Airflow 2.x: users create
        # Airflow 3.x: user create (ohne 's')
        airflow users create \
          --username ${AIRFLOW_WWW_USER_USERNAME} \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          --password ${AIRFLOW_WWW_USER_PASSWORD} \
        || airflow user create \
          --username ${AIRFLOW_WWW_USER_USERNAME} \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          --password ${AIRFLOW_WWW_USER_PASSWORD}
    restart: on-failure

  # ─────────────────────────────────────────
  # Airflow Webserver
  # ─────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: weather_airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ─────────────────────────────────────────
  # Airflow Scheduler
  # ─────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: weather_airflow_scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ─────────────────────────────────────────
  # FastAPI Backend
  # ─────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: weather_backend
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost,http://localhost:80}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./config:/app/config
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Mailhog (SMTP catch-all für lokale Entwicklung)
  # ─────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: weather_mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Nginx Frontend
  # ─────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: weather_frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres-data:
  airflow-logs:
