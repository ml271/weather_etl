<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Warning Builder – Weather Data Visualisation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* ── Page layout ── */
    .page-wrap {
      position: relative; z-index: 1;
      max-width: 1280px;
      margin: 0 auto;
      padding: 1.5rem 2rem 4rem;
    }

    .page-title {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: .14em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    /* ── 3-column builder ── */
    .builder {
      display: grid;
      grid-template-columns: 280px 1fr 280px;
      gap: 1.25rem;
      align-items: start;
    }

    .builder-col {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1.25rem;
    }

    .col-title {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: .12em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 1rem;
      padding-bottom: .5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── Form elements ── */
    .field { margin-bottom: .75rem; }
    .field label {
      display: block;
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: .3rem;
      font-family: var(--font-mono);
      letter-spacing: .08em;
    }
    .field input, .field select {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: .5rem .7rem;
      font-family: var(--font-body);
      font-size: 13px;
      outline: none;
    }
    .field input:focus, .field select:focus {
      border-color: var(--accent);
    }
    .field input::placeholder { color: var(--text-muted); }

    /* ── Station search results ── */
    .station-results {
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-top: none;
      display: none;
    }
    .station-results.open { display: block; }
    .station-result-item {
      padding: .45rem .7rem;
      font-size: 12px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
    }
    .station-result-item:hover { background: var(--surface-2); }
    .station-result-item .result-region {
      font-size: 10px;
      color: var(--text-dim);
    }
    .station-selected {
      background: var(--surface-2);
      border: 1px solid var(--border-bright);
      padding: .5rem .7rem;
      font-size: 13px;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: .5rem;
    }
    .station-selected.visible { display: flex; }
    .station-clear-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
    }
    .station-clear-btn:hover { color: var(--danger); }

    /* ── Templates ── */
    .template-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .4rem;
      margin-bottom: 1rem;
    }
    .tpl-btn {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: .4rem .5rem;
      font-size: 11px;
      font-family: var(--font-mono);
      cursor: pointer;
      text-align: left;
      transition: border-color .15s, color .15s;
    }
    .tpl-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Condition builder ── */
    .condition-row {
      display: grid;
      grid-template-columns: 1fr auto 80px;
      gap: .4rem;
      margin-bottom: .5rem;
    }
    .condition-row select, .condition-row input {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: .45rem .5rem;
      font-size: 12px;
      font-family: var(--font-body);
      outline: none;
      width: 100%;
    }
    .condition-row select:focus, .condition-row input:focus {
      border-color: var(--accent);
    }
    .add-condition-btn {
      width: 100%;
      background: none;
      border: 1px dashed var(--border-bright);
      color: var(--text-dim);
      padding: .5rem;
      font-size: 12px;
      font-family: var(--font-mono);
      cursor: pointer;
      margin-top: .25rem;
      transition: border-color .15s, color .15s;
    }
    .add-condition-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Condition chips list ── */
    .conditions-list { margin-top: 1rem; }
    .condition-chip {
      display: flex;
      align-items: center;
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: .35rem .5rem;
      font-size: 11px;
      margin-bottom: .35rem;
      gap: .4rem;
    }
    .chip-op-btn {
      background: none;
      border: 1px solid var(--border-bright);
      color: var(--accent);
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: .06em;
      padding: .15rem .35rem;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .chip-op-btn:hover { background: rgba(74,158,255,.08); }
    .chip-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .chip-del {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 0 2px;
      flex-shrink: 0;
    }
    .chip-del:hover { color: var(--danger); }

    /* operator selector before the add-row (shown only when conditions > 0) */
    .new-op-row {
      display: none;
      gap: .4rem;
      margin-bottom: .4rem;
    }
    .new-op-row.visible { display: flex; }
    .new-op-btn {
      flex: 1;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: .3rem;
      font-family: var(--font-mono);
      font-size: 10px;
      cursor: pointer;
    }
    .new-op-btn.active { border-color: var(--accent); color: var(--accent); }

    /* keyboard focus highlight in station results */
    .station-result-item.focused { background: var(--surface-2); color: var(--accent); }

    /* ── Validity type tabs ── */
    .validity-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1rem;
    }
    .validity-tab {
      flex: 1;
      background: none;
      border: none;
      padding: .5rem 0;
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: .08em;
      color: var(--text-dim);
      cursor: pointer;
      text-transform: uppercase;
      border-bottom: 2px solid transparent;
    }
    .validity-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .validity-panel { display: none; }
    .validity-panel.active { display: block; }

    /* ── Weekday / month checkboxes ── */
    .day-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: .25rem;
      margin-bottom: .5rem;
    }
    .month-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: .25rem;
    }
    .day-check, .month-check { display: none; }
    .day-label, .month-label {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface-2);
      border: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 9px;
      padding: .4rem .1rem;
      cursor: pointer;
      transition: border-color .15s, color .15s;
      text-align: center;
    }
    .day-check:checked + .day-label,
    .month-check:checked + .month-label {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(74,158,255,.08);
    }

    /* ── Save bar ── */
    .save-bar {
      margin-top: 1.25rem;
      display: flex;
      gap: .75rem;
      justify-content: flex-end;
    }
    .btn-save {
      background: var(--accent);
      border: none;
      color: #080c12;
      padding: .65rem 2rem;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: .1em;
      cursor: pointer;
      font-weight: 700;
    }
    .btn-save:hover { opacity: .9; }
    .btn-cancel {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: .65rem 1.5rem;
      font-family: var(--font-mono);
      font-size: 11px;
      cursor: pointer;
    }
    .btn-cancel:hover { border-color: var(--text-dim); }

    /* ── Warning name modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(8,12,18,.8);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border-bright);
      padding: 2rem;
      width: 380px;
    }
    .modal-title {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: .12em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    .modal-input {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: .6rem .8rem;
      font-size: 14px;
      outline: none;
      margin-bottom: 1rem;
    }
    .modal-input:focus { border-color: var(--accent); }
    .modal-actions { display: flex; gap: .75rem; justify-content: flex-end; }

    /* ── Saved warnings list ── */
    .section-divider {
      margin: 2rem 0 1rem;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: .14em;
      color: var(--text-dim);
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      padding-bottom: .5rem;
    }
    .warnings-list { display: flex; flex-direction: column; gap: .5rem; }
    .warning-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: .75rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .warning-card-info { flex: 1; min-width: 0; }
    .warning-card-name {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: .2rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .warning-card-meta {
      font-size: 11px;
      color: var(--text-dim);
      font-family: var(--font-mono);
    }
    .warning-card-actions { display: flex; gap: .4rem; flex-shrink: 0; }
    .card-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: .3rem .7rem;
      font-size: 11px;
      font-family: var(--font-mono);
      cursor: pointer;
    }
    .card-btn:hover { border-color: var(--accent); color: var(--accent); }
    .card-btn.danger:hover { border-color: var(--danger); color: var(--danger); }

    .empty-state {
      color: var(--text-dim);
      font-size: 12px;
      font-family: var(--font-mono);
      padding: 1rem;
      text-align: center;
      border: 1px dashed var(--border);
    }

    .status-msg {
      font-size: 12px;
      font-family: var(--font-mono);
      padding: .5rem .75rem;
      display: none;
      margin-top: .75rem;
    }
    .status-msg.ok   { color: var(--info);   border: 1px solid rgba(74,223,184,.3); }
    .status-msg.err  { color: var(--danger); border: 1px solid rgba(255,74,106,.3); }
    .status-msg.show { display: block; }
  </style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<!-- Header -->
<header class="header">
  <div class="header-left">
    <a href="javascript:history.back()" style="font-family:var(--font-mono);font-size:11px;letter-spacing:.14em;color:var(--accent);text-decoration:none;">
      ← BACK
    </a>
  </div>
  <div class="header-center" style="font-family:var(--font-mono);font-size:11px;letter-spacing:.14em;color:var(--text-dim);">
    WARNING BUILDER
  </div>
  <div class="header-right">
    <div class="user-menu-wrap" id="userMenuWrap">
      <button class="user-menu-btn" id="userMenuBtn" title="Sign in">
        <span class="user-online-dot"></span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
      </button>
      <div class="user-panel" id="userPanel">
        <div class="user-panel-header">
          <span id="userPanelUsername">—</span>
        </div>
        <div class="user-panel-section">
          <div class="user-panel-label">Email</div>
          <div class="user-panel-value" id="userPanelEmail">—</div>
        </div>
        <div class="user-panel-footer">
          <button class="user-panel-btn" onclick="userLogout()">SIGN OUT</button>
        </div>
      </div>
    </div>
  </div>
</header>

<div class="page-wrap">
  <div class="page-title" id="builderTitle">Create new warning</div>

  <!-- ── 3-column builder ── -->
  <div class="builder">

    <!-- LEFT: Station -->
    <div class="builder-col">
      <div class="col-title">01 — Station / Location</div>

      <!-- Search -->
      <div class="field">
        <label>Search location</label>
        <input type="text" id="stationSearch" placeholder="e.g. Berlin, Munich …" autocomplete="off" />
        <div class="station-results" id="stationResults"></div>
      </div>

      <!-- Selected station display -->
      <div class="station-selected" id="stationSelected">
        <span id="stationSelectedName">—</span>
        <button class="station-clear-btn" id="stationClearBtn" title="Clear selection">×</button>
      </div>

      <div style="font-size:11px;color:var(--text-dim);margin-top:.5rem;font-family:var(--font-mono);" id="stationHint">
        No station selected
      </div>
    </div>

    <!-- MIDDLE: Conditions -->
    <div class="builder-col">
      <div class="col-title">02 — Weather Conditions</div>

      <!-- Templates -->
      <div style="font-size:11px;color:var(--text-dim);margin-bottom:.4rem;font-family:var(--font-mono);">
        Quick-start template
      </div>
      <div class="template-grid" id="templateGrid">
        <!-- filled by JS -->
      </div>

      <hr style="border:none;border-top:1px solid var(--border);margin:.75rem 0;" />

      <!-- New condition row -->
      <div style="font-size:11px;color:var(--text-dim);margin-bottom:.4rem;font-family:var(--font-mono);">
        Add condition
      </div>

      <!-- Operator selector (only shown when at least 1 condition exists) -->
      <div class="new-op-row" id="newOpRow">
        <button class="new-op-btn active" id="newOpAnd"    onclick="setNewOp('AND')">AND</button>
        <button class="new-op-btn"        id="newOpOr"     onclick="setNewOp('OR')">OR</button>
        <button class="new-op-btn"        id="newOpAndNot" onclick="setNewOp('AND NOT')">AND NOT</button>
      </div>

      <div class="condition-row">
        <select id="condParam">
          <optgroup label="Temperature">
            <option value="temperature_max"    data-label="Temp. max.">Temperature max. (°C)</option>
            <option value="temperature_min"    data-label="Temp. min.">Temperature min. (°C)</option>
          </optgroup>
          <optgroup label="Precipitation">
            <option value="precipitation_sum"  data-label="Precipitation">Precipitation (mm)</option>
            <option value="snowfall_sum"       data-label="Snowfall">Snowfall (cm)</option>
          </optgroup>
          <optgroup label="Wind">
            <option value="wind_speed_max"     data-label="Wind max.">Wind max. (km/h)</option>
            <option value="wind_gusts_max"     data-label="Wind gusts max.">Wind gusts max. (km/h)</option>
          </optgroup>
          <optgroup label="Sun / UV">
            <option value="sunshine_duration"  data-label="Sunshine">Sunshine duration (s/h)</option>
            <option value="uv_index_max"       data-label="UV Index">UV Index</option>
          </optgroup>
          <optgroup label="Soil">
            <option value="soil_temperature_0cm" data-label="Soil temp. (0 cm)">Soil temp. 0 cm (°C)</option>
            <option value="soil_temperature_6cm" data-label="Soil temp. (6 cm)">Soil temp. 6 cm (°C)</option>
            <option value="soil_moisture_0_1cm"  data-label="Soil moisture (0–1 cm)">Soil moisture 0–1 cm (m³/m³)</option>
            <option value="soil_moisture_1_3cm"  data-label="Soil moisture (1–3 cm)">Soil moisture 1–3 cm (m³/m³)</option>
          </optgroup>
        </select>
        <select id="condComp" style="width:60px;">
          <option>&gt;</option>
          <option>&lt;</option>
          <option>&gt;=</option>
          <option>&lt;=</option>
          <option>==</option>
        </select>
        <input type="number" id="condValue" value="0" step="any" />
      </div>
      <button class="add-condition-btn" onclick="addCondition()">+ Add condition</button>

      <!-- Chips -->
      <div class="conditions-list" id="conditionsList"></div>
    </div>

    <!-- RIGHT: Validity -->
    <div class="builder-col">
      <div class="col-title">03 — Validity Period</div>

      <div class="validity-tabs">
        <button class="validity-tab active" onclick="setValidityType('date_range')" id="vtab-date_range">Date Range</button>
        <button class="validity-tab" onclick="setValidityType('weekdays')" id="vtab-weekdays">Weekdays</button>
        <button class="validity-tab" onclick="setValidityType('months')" id="vtab-months">Months</button>
      </div>

      <!-- Date range -->
      <div class="validity-panel active" id="vpanel-date_range">
        <div class="field">
          <label>From</label>
          <input type="date" id="dateFrom" />
        </div>
        <div class="field">
          <label>To</label>
          <input type="date" id="dateTo" />
        </div>
      </div>

      <!-- Weekdays -->
      <div class="validity-panel" id="vpanel-weekdays">
        <div style="font-size:11px;color:var(--text-dim);margin-bottom:.5rem;font-family:var(--font-mono);">
          Select weekday(s)
        </div>
        <div class="day-grid">
          <div><input type="checkbox" class="day-check" id="d0" value="0"><label class="day-label" for="d0">Mon</label></div>
          <div><input type="checkbox" class="day-check" id="d1" value="1"><label class="day-label" for="d1">Tue</label></div>
          <div><input type="checkbox" class="day-check" id="d2" value="2"><label class="day-label" for="d2">Wed</label></div>
          <div><input type="checkbox" class="day-check" id="d3" value="3"><label class="day-label" for="d3">Thu</label></div>
          <div><input type="checkbox" class="day-check" id="d4" value="4"><label class="day-label" for="d4">Fri</label></div>
          <div><input type="checkbox" class="day-check" id="d5" value="5"><label class="day-label" for="d5">Sat</label></div>
          <div><input type="checkbox" class="day-check" id="d6" value="6"><label class="day-label" for="d6">Sun</label></div>
        </div>
      </div>

      <!-- Months -->
      <div class="validity-panel" id="vpanel-months">
        <div style="font-size:11px;color:var(--text-dim);margin-bottom:.5rem;font-family:var(--font-mono);">
          Select month(s)
        </div>
        <div class="month-grid">
          <div><input type="checkbox" class="month-check" id="m1"  value="1" ><label class="month-label" for="m1" >Jan</label></div>
          <div><input type="checkbox" class="month-check" id="m2"  value="2" ><label class="month-label" for="m2" >Feb</label></div>
          <div><input type="checkbox" class="month-check" id="m3"  value="3" ><label class="month-label" for="m3" >Mar</label></div>
          <div><input type="checkbox" class="month-check" id="m4"  value="4" ><label class="month-label" for="m4" >Apr</label></div>
          <div><input type="checkbox" class="month-check" id="m5"  value="5" ><label class="month-label" for="m5" >May</label></div>
          <div><input type="checkbox" class="month-check" id="m6"  value="6" ><label class="month-label" for="m6" >Jun</label></div>
          <div><input type="checkbox" class="month-check" id="m7"  value="7" ><label class="month-label" for="m7" >Jul</label></div>
          <div><input type="checkbox" class="month-check" id="m8"  value="8" ><label class="month-label" for="m8" >Aug</label></div>
          <div><input type="checkbox" class="month-check" id="m9"  value="9" ><label class="month-label" for="m9" >Sep</label></div>
          <div><input type="checkbox" class="month-check" id="m10" value="10"><label class="month-label" for="m10">Oct</label></div>
          <div><input type="checkbox" class="month-check" id="m11" value="11"><label class="month-label" for="m11">Nov</label></div>
          <div><input type="checkbox" class="month-check" id="m12" value="12"><label class="month-label" for="m12">Dec</label></div>
        </div>
      </div>
    </div>
  </div><!-- /builder -->

  <div id="statusMsg" class="status-msg"></div>

  <div class="save-bar">
    <button class="btn-cancel" id="cancelBtn" onclick="resetForm()" style="display:none;">Cancel</button>
    <button class="btn-save" onclick="openSaveModal()">Save warning</button>
  </div>

  <!-- Saved warnings list -->
  <div class="section-divider">My Warnings</div>
  <div class="warnings-list" id="warningsList">
    <div class="empty-state" id="warningsEmpty">No warnings saved yet.</div>
  </div>
</div><!-- /page-wrap -->

<!-- Save / Name modal -->
<div class="modal-overlay" id="saveModal">
  <div class="modal-box">
    <div class="modal-title">Name your warning</div>
    <input type="text" class="modal-input" id="warningNameInput" placeholder="e.g. Weekend sunshine, Frost alert …" maxlength="100" />
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeSaveModal()">Cancel</button>
      <button class="btn-save" onclick="saveWarning()">Save</button>
    </div>
  </div>
</div>

<script src="js/user-menu.js"></script>
<script>
  const API = "/api";

  // ── State ────────────────────────────────────────────────────────────────
  let selectedStation = null;   // {id, name, city}
  let conditions      = [];     // [{parameter, comparator, value, label, operator}]
                                // operator: null for first item, "AND"|"AND NOT" for rest
  let newOpValue      = "AND";  // operator for the NEXT condition to be added
  let validityType    = "date_range";
  let editingId       = null;

  // ── Init ─────────────────────────────────────────────────────────────────
  document.addEventListener("DOMContentLoaded", async () => {
    if (!localStorage.getItem("token")) {
      window.location.href = "login.html";
      return;
    }
    await loadTemplates();
    await loadWarnings();
    const params = new URLSearchParams(window.location.search);
    if (params.get("edit")) await loadForEdit(parseInt(params.get("edit")));
  });

  // ── Templates ─────────────────────────────────────────────────────────────
  async function loadTemplates() {
    try {
      const res = await fetch(`${API}/warnings/templates`);
      if (!res.ok) return;
      const templates = await res.json();
      const grid = document.getElementById("templateGrid");
      grid.innerHTML = "";
      templates.forEach(t => {
        const btn = document.createElement("button");
        btn.className = "tpl-btn";
        btn.textContent = t.name;
        btn.title = t.description || t.name;
        btn.onclick = () => applyTemplate(t);
        grid.appendChild(btn);
      });
    } catch (e) { /* silent */ }
  }

  // Templates APPEND to existing conditions (not replace)
  function applyTemplate(t) {
    t.conditions.forEach(c => {
      conditions.push({
        ...c,
        operator: conditions.length === 0 ? null : newOpValue,
      });
    });
    renderConditions();
  }

  // ── Station search ────────────────────────────────────────────────────────
  const stationSearch  = document.getElementById("stationSearch");
  const stationResults = document.getElementById("stationResults");
  let _searchTimer = null;
  let _focusedIdx  = -1;   // for arrow-key navigation

  stationSearch.addEventListener("input", () => {
    _focusedIdx = -1;
    clearTimeout(_searchTimer);
    _searchTimer = setTimeout(() => doStationSearch(stationSearch.value.trim()), 250);
  });

  stationSearch.addEventListener("keydown", e => {
    const items = stationResults.querySelectorAll(".station-result-item");
    if (!items.length) return;

    if (e.key === "ArrowDown") {
      e.preventDefault();
      _focusedIdx = Math.min(_focusedIdx + 1, items.length - 1);
      _updateFocus(items);
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      _focusedIdx = Math.max(_focusedIdx - 1, 0);
      _updateFocus(items);
    } else if (e.key === "Enter") {
      e.preventDefault();
      if (_focusedIdx >= 0 && items[_focusedIdx]) items[_focusedIdx].click();
    } else if (e.key === "Escape") {
      stationResults.classList.remove("open");
      _focusedIdx = -1;
    }
  });

  function _updateFocus(items) {
    items.forEach((el, i) => el.classList.toggle("focused", i === _focusedIdx));
    if (items[_focusedIdx]) items[_focusedIdx].scrollIntoView({ block: "nearest" });
  }

  async function doStationSearch(q) {
    if (q.length < 2) { stationResults.classList.remove("open"); return; }
    try {
      const res = await fetch(`${API}/stations/search?q=${encodeURIComponent(q)}`);
      if (!res.ok) return;
      const items = await res.json();
      stationResults.innerHTML = "";
      _focusedIdx = -1;
      if (!items.length) {
        stationResults.innerHTML = '<div style="padding:.5rem .7rem;font-size:12px;color:var(--text-dim);">No results</div>';
      } else {
        items.forEach(s => {
          const el = document.createElement("div");
          el.className = "station-result-item";
          el.innerHTML = `<div>${s.name}</div><div class="result-region">${s.region || s.country || ""}</div>`;
          el.onclick = () => selectStation(s);
          stationResults.appendChild(el);
        });
      }
      stationResults.classList.add("open");
    } catch (e) { /* silent */ }
  }

  function selectStation(s) {
    selectedStation = { id: s.id, name: s.name, city: s.name };
    stationResults.classList.remove("open");
    _focusedIdx = -1;
    stationSearch.style.display = "none";
    document.getElementById("stationSelected").classList.add("visible");
    document.getElementById("stationSelectedName").textContent = `${s.name}${s.region ? " · " + s.region : ""}`;
    document.getElementById("stationHint").style.display = "none";
  }

  document.getElementById("stationClearBtn").onclick = () => {
    selectedStation = null;
    stationSearch.style.display = "";
    stationSearch.value = "";
    document.getElementById("stationSelected").classList.remove("visible");
    document.getElementById("stationHint").style.display = "";
  };

  document.addEventListener("click", e => {
    if (!stationSearch.contains(e.target) && !stationResults.contains(e.target)) {
      stationResults.classList.remove("open");
    }
  });

  // ── Conditions ────────────────────────────────────────────────────────────

  // Operator for the next new condition
  function setNewOp(op) {
    newOpValue = op;
    document.getElementById("newOpAnd").classList.toggle("active",    op === "AND");
    document.getElementById("newOpOr").classList.toggle("active",     op === "OR");
    document.getElementById("newOpAndNot").classList.toggle("active", op === "AND NOT");
  }

  function addCondition() {
    const param = document.getElementById("condParam");
    const comp  = document.getElementById("condComp");
    const val   = document.getElementById("condValue");
    const label = param.options[param.selectedIndex].dataset.label || param.value;
    conditions.push({
      parameter:  param.value,
      comparator: comp.value,
      value:      parseFloat(val.value),
      label,
      operator:   conditions.length === 0 ? null : newOpValue,
    });
    renderConditions();
  }

  function removeCondition(i) {
    conditions.splice(i, 1);
    // If first condition was removed, clear operator of new first
    if (i === 0 && conditions.length > 0) conditions[0].operator = null;
    renderConditions();
  }

  function toggleChipOp(i) {
    if (i === 0) return;
    const cycle = ["AND", "OR", "AND NOT"];
    const cur   = conditions[i].operator || "AND";
    conditions[i].operator = cycle[(cycle.indexOf(cur) + 1) % cycle.length];
    renderConditions();
  }

  function renderConditions() {
    const list = document.getElementById("conditionsList");
    list.innerHTML = "";
    conditions.forEach((c, i) => {
      const chip = document.createElement("div");
      chip.className = "condition-chip";
      const opBtn = i > 0
        ? `<button class="chip-op-btn" onclick="toggleChipOp(${i})" title="Toggle operator">${c.operator || "AND"}</button>`
        : `<span style="width:4px;"></span>`;
      chip.innerHTML = `
        ${opBtn}
        <span class="chip-text">${c.label || c.parameter} ${c.comparator} ${c.value}</span>
        <button class="chip-del" onclick="removeCondition(${i})" title="Remove">×</button>`;
      list.appendChild(chip);
    });
    // Show/hide the operator selector for the next condition
    document.getElementById("newOpRow").classList.toggle("visible", conditions.length > 0);
  }

  // ── Validity ──────────────────────────────────────────────────────────────
  function setValidityType(type) {
    validityType = type;
    ["date_range", "weekdays", "months"].forEach(t => {
      document.getElementById(`vtab-${t}`).classList.toggle("active", t === type);
      document.getElementById(`vpanel-${t}`).classList.toggle("active", t === type);
    });
  }

  function getValidity() {
    if (validityType === "date_range") {
      return {
        type:      "date_range",
        date_from: document.getElementById("dateFrom").value || null,
        date_to:   document.getElementById("dateTo").value   || null,
      };
    }
    if (validityType === "weekdays") {
      const weekdays = [...document.querySelectorAll(".day-check:checked")].map(el => parseInt(el.value));
      return { type: "weekdays", weekdays };
    }
    if (validityType === "months") {
      const months = [...document.querySelectorAll(".month-check:checked")].map(el => parseInt(el.value));
      return { type: "months", months };
    }
  }

  function setValidity(v) {
    if (!v) return;
    setValidityType(v.type);
    if (v.type === "date_range") {
      if (v.date_from) document.getElementById("dateFrom").value = v.date_from;
      if (v.date_to)   document.getElementById("dateTo").value   = v.date_to;
    }
    if (v.type === "weekdays" && v.weekdays) {
      v.weekdays.forEach(d => { const el = document.getElementById(`d${d}`); if (el) el.checked = true; });
    }
    if (v.type === "months" && v.months) {
      v.months.forEach(m => { const el = document.getElementById(`m${m}`); if (el) el.checked = true; });
    }
  }

  // ── Modal ─────────────────────────────────────────────────────────────────
  function openSaveModal() {
    if (!selectedStation) { showStatus("Please select a station first.", "err"); return; }
    if (!conditions.length) { showStatus("Add at least one condition.", "err"); return; }
    document.getElementById("saveModal").classList.add("open");
    document.getElementById("warningNameInput").focus();
  }

  function closeSaveModal() {
    document.getElementById("saveModal").classList.remove("open");
  }

  document.getElementById("warningNameInput").addEventListener("keydown", e => {
    if (e.key === "Enter") saveWarning();
    if (e.key === "Escape") closeSaveModal();
  });

  // ── Save / Update ─────────────────────────────────────────────────────────
  async function saveWarning() {
    const name = document.getElementById("warningNameInput").value.trim();
    if (!name) { document.getElementById("warningNameInput").focus(); return; }

    const body = {
      station_id: selectedStation.id,
      city:       selectedStation.city,
      name,
      conditions,
      validity:   getValidity(),
    };

    const token  = localStorage.getItem("token");
    const url    = editingId ? `${API}/warnings/${editingId}` : `${API}/warnings/`;
    const method = editingId ? "PUT" : "POST";

    try {
      const res = await fetch(url, {
        method,
        headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
        body: JSON.stringify(body),
      });
      if (!res.ok) throw new Error(await res.text());
      closeSaveModal();
      showStatus(editingId ? "Warning updated." : "Warning saved.", "ok");
      resetForm();
      await loadWarnings();
    } catch (e) {
      closeSaveModal();
      showStatus("Error saving: " + e.message, "err");
    }
  }

  // ── Load for editing ──────────────────────────────────────────────────────
  async function loadForEdit(id) {
    const token = localStorage.getItem("token");
    try {
      const res = await fetch(`${API}/warnings/${id}`, {
        headers: { Authorization: `Bearer ${token}` },
      });
      if (!res.ok) return;
      const w = await res.json();
      editingId = id;

      selectedStation = { id: w.station_id, name: w.city, city: w.city };
      stationSearch.style.display = "none";
      document.getElementById("stationSelected").classList.add("visible");
      document.getElementById("stationSelectedName").textContent = w.city;
      document.getElementById("stationHint").style.display = "none";

      conditions = Array.isArray(w.conditions) ? w.conditions : [];
      renderConditions();
      setValidity(w.validity);
      document.getElementById("warningNameInput").value = w.name;
      document.getElementById("builderTitle").textContent = `Edit warning: ${w.name}`;
      document.getElementById("cancelBtn").style.display = "";
    } catch (e) { /* silent */ }
  }

  // ── Load warnings list ────────────────────────────────────────────────────
  async function loadWarnings() {
    const token = localStorage.getItem("token");
    if (!token) return;
    try {
      const res = await fetch(`${API}/warnings/`, {
        headers: { Authorization: `Bearer ${token}` },
      });
      if (!res.ok) return;
      renderWarningsList(await res.json());
    } catch (e) { /* silent */ }
  }

  function renderWarningsList(list) {
    const container = document.getElementById("warningsList");
    const empty     = document.getElementById("warningsEmpty");
    container.innerHTML = "";
    if (!list.length) {
      container.appendChild(empty);
      empty.style.display = "";
      return;
    }
    list.forEach(w => {
      const card = document.createElement("div");
      card.className = "warning-card";
      card.innerHTML = `
        <div class="warning-card-info">
          <div class="warning-card-name">${w.name}</div>
          <div class="warning-card-meta">${w.city} · ${buildValidityMeta(w.validity)}</div>
        </div>
        <div class="warning-card-actions">
          <button class="card-btn" onclick="editWarning(${w.id})">Edit</button>
          <button class="card-btn danger" onclick="deleteWarning(${w.id})">Delete</button>
        </div>`;
      container.appendChild(card);
    });
  }

  function buildValidityMeta(v) {
    if (!v) return "—";
    if (v.type === "date_range") return `${v.date_from || "?"} → ${v.date_to || "?"}`;
    if (v.type === "weekdays") {
      const names = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
      return (v.weekdays || []).map(d => names[d] || d).join(", ");
    }
    if (v.type === "months") {
      const names = ["","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      return (v.months || []).map(m => names[m] || m).join(", ");
    }
    return "—";
  }

  function editWarning(id) { window.location.href = `warnings.html?edit=${id}`; }

  async function deleteWarning(id) {
    if (!confirm("Really delete this warning?")) return;
    const token = localStorage.getItem("token");
    try {
      const res = await fetch(`${API}/warnings/${id}`, {
        method: "DELETE",
        headers: { Authorization: `Bearer ${token}` },
      });
      if (res.status === 204) { showStatus("Warning deleted.", "ok"); await loadWarnings(); }
      else showStatus("Error deleting.", "err");
    } catch { showStatus("Network error.", "err"); }
  }

  // ── Reset ─────────────────────────────────────────────────────────────────
  function resetForm() {
    editingId = null;
    selectedStation = null;
    conditions = [];
    newOpValue = "AND";
    stationSearch.style.display = "";
    stationSearch.value = "";
    document.getElementById("stationSelected").classList.remove("visible");
    document.getElementById("stationHint").style.display = "";
    document.getElementById("conditionsList").innerHTML = "";
    document.getElementById("newOpRow").classList.remove("visible");
    setNewOp("AND");
    setValidityType("date_range");
    document.getElementById("dateFrom").value = "";
    document.getElementById("dateTo").value = "";
    document.querySelectorAll(".day-check, .month-check").forEach(el => el.checked = false);
    document.getElementById("warningNameInput").value = "";
    document.getElementById("builderTitle").textContent = "Create new warning";
    document.getElementById("cancelBtn").style.display = "none";
    history.replaceState(null, "", "warnings.html");
  }

  function showStatus(msg, type) {
    const el = document.getElementById("statusMsg");
    el.textContent = msg;
    el.className = `status-msg ${type} show`;
    setTimeout(() => el.classList.remove("show"), 4000);
  }
</script>
</body>
</html>
